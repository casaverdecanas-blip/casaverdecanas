<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CasaVerde 2.0 · Actividades</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2d5a27">
<style>
  .filtros { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
  .fchip {
    border: 1px solid var(--linea); background: #fff; border-radius: 999px;
    padding: 6px 14px; font: inherit; font-size: .86rem; cursor: pointer; color: var(--gris);
  }
  .fchip.activo { background: var(--verde); border-color: var(--verde); color: #fff; }

  .act-item { margin: 6px 0; }
  .act-row {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--linea); border-radius: var(--radio);
    padding: 10px 12px; cursor: pointer; box-shadow: var(--sombra);
  }
  .act-row .caret { width: 18px; text-align: center; color: var(--gris); flex: none; font-size: .8rem; }
  .act-titulo { flex: 1; min-width: 0; font-weight: 600; font-size: .95rem; overflow-wrap: anywhere; }
  .act-titulo small { display: block; font-weight: 400; color: var(--gris); font-size: .78rem; }
  .act-chips { display: flex; gap: 5px; align-items: center; flex: none; flex-wrap: wrap; justify-content: flex-end; }
  .sem { width: 12px; height: 12px; border-radius: 50%; flex: none; }
  .mini {
    font-size: .72rem; padding: 2px 8px; border-radius: 999px;
    background: rgba(255, 255, 255, .75); border: 1px solid var(--linea); color: var(--gris); white-space: nowrap;
  }
  .act-children { margin-left: 16px; padding-left: 10px; border-left: 3px solid var(--linea); }
  .act-detalle {
    border: 1px solid var(--linea); border-top: 0; border-radius: 0 0 var(--radio) var(--radio);
    margin: -6px 2px 0; padding: 10px 12px; font-size: .86rem;
  }
  .act-detalle .acciones { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; align-items: center; }

  /* Botones compactos (pedido del admin) */
  .btn-ico {
    border: 1px solid var(--linea); background: #fff; border-radius: 7px;
    padding: 5px 7px; cursor: pointer; display: inline-flex; align-items: center;
    font: inherit; color: var(--tinta); line-height: 1;
  }
  .btn-ico .material-icons { font-size: 17px; }
  .btn-ico.play { background: var(--ok); border-color: var(--ok); color: #fff; }
  .btn-ico.stop { background: var(--rojo); border-color: var(--rojo); color: #fff; }

  .crono {
    display: inline-flex; align-items: center; gap: 5px;
    background: #123c0e; color: #d9f2d3; border-radius: 999px;
    padding: 4px 12px; font-size: .82rem; font-variant-numeric: tabular-nums;
  }
  /* Banner prioritario: si hay un reloj corriendo es lo PRIMERO que se ve */
  .banner-crono {
    display: flex; align-items: center; gap: 10px;
    background: #123c0e; color: #eaf7e6; border-radius: var(--radio);
    padding: 12px 14px; margin: 10px 0; box-shadow: var(--sombra);
    position: sticky; top: 58px; z-index: 50;
  }
  .banner-crono .reloj { font-size: 1.25rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .banner-crono .que { flex: 1; min-width: 0; font-size: .9rem; overflow-wrap: anywhere; }
  .banner-crono .btn-stop {
    background: var(--rojo); border: 0; color: #fff; border-radius: 10px;
    padding: 10px 16px; font: inherit; font-weight: 700; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .estrella { color: #c9a227; }
  .act-row.hecha .act-titulo { text-decoration: line-through; color: var(--gris); font-weight: 500; }
  .act-row.hecha { opacity: .75; }
  .vacio { text-align: center; color: var(--gris); padding: 30px 10px; }

  dialog {
    border: 0; border-radius: 14px; padding: 0; width: min(560px, 94vw);
    max-height: 88dvh; box-shadow: 0 10px 40px rgba(0, 0, 0, .25);
  }
  dialog::backdrop { background: rgba(20, 30, 18, .45); }
  .m-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 0; }
  .m-head h2 { margin: 0; }
  .m-body { padding: 6px 16px 16px; overflow-y: auto; }
  .m-pie { display: flex; gap: 8px; justify-content: flex-end; padding: 0 16px 16px; }
  .fila2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .check-linea { display: flex; align-items: center; gap: 8px; margin: 10px 0 0; }
  .check-linea input { width: auto; }
  .check-linea span { font-size: .88rem; }
</style>
</head>
<body>

<div id="nav"></div>

<div class="contenedor">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <h1 style="margin-right:auto;">Actividades</h1>
    <button class="btn btn-primario" id="btnNuevoProyecto">
      <span class="material-icons">create_new_folder</span> Proyecto
    </button>
  </div>

  <div id="bannerCrono"></div>

  <div class="filtros" id="filtros">
    <button class="fchip activo" data-f="todas">Todas</button>
    <button class="fchip" data-f="hoy">Hoy</button>
    <button class="fchip" data-f="destacadas">★ Destacadas</button>
  </div>

  <div id="arbol"><div class="vacio">Cargando…</div></div>
</div>

<dialog id="modal">
  <div class="m-head">
    <h2 id="mTitulo">Nueva actividad</h2>
    <button class="btn-ico" id="mCerrar"><span class="material-icons">close</span></button>
  </div>
  <div class="m-body">
    <label>Título</label>
    <input id="fTitulo" maxlength="120">

    <label>Detalle (opcional)</label>
    <textarea id="fDetalle" rows="2"></textarea>

    <div id="grupoPadre">
      <label>Pertenece a</label>
      <select id="fPadre"></select>
    </div>

    <div id="grupoColor" class="oculto">
      <label>Color del proyecto (toda la línea lo hereda)</label>
      <input id="fColor" type="color" value="#2d5a27" style="height:44px;padding:4px;">
    </div>

    <div class="fila2">
      <div>
        <label>Alcance</label>
        <select id="fAlcance">
          <option value="equipo">Equipo (todos)</option>
          <option value="asignados">Asignados (elegir quiénes)</option>
          <option value="personal">Personal (solo yo)</option>
        </select>
      </div>
      <div>
        <label>Prioridad</label>
        <select id="fPrioridad">
          <option value="">Normal</option>
          <option value="rojo">🔴 Urgente</option>
          <option value="amarillo">🟡 Importante</option>
        </select>
      </div>
    </div>

    <div class="fila2">
      <div>
        <label>Repetir cada (días, 0 = no repite)</label>
        <input id="fRecurrencia" type="number" min="0" step="1" value="0" inputmode="numeric">
      </div>
      <div>
        <label>Precio / honorario (R$, 0 = sin precio)</label>
        <input id="fMonto" type="number" min="0" step="0.01" value="0" inputmode="decimal">
      </div>
    </div>

    <div class="fila2">
      <div>
        <label>Fecha de inicio</label>
        <input id="fFechaInicio" type="date">
      </div>
      <div>
        <label>Vencimiento (opcional)</label>
        <input id="fFechaVenc" type="date">
      </div>
    </div>

    <div id="grupoCompetencias" class="oculto">
      <label>Quiénes (además del creador)</label>
      <div id="fCompetencias" style="display:flex;flex-direction:column;gap:6px;border:1px solid var(--linea);border-radius:8px;padding:10px;"></div>
    </div>

    <div class="check-linea">
      <input id="fEsCompra" type="checkbox">
      <span>Es una compra</span>
      <input id="fProveedor" placeholder="Proveedor (opcional)" class="oculto" style="flex:1;">
    </div>
  </div>
  <div class="m-pie">
    <button class="btn" id="mCancelar">Cancelar</button>
    <button class="btn btn-primario" id="mGuardar">
      <span class="material-icons">save</span> Guardar
    </button>
  </div>
</dialog>

<script type="module">
// ═══════════════════════════════════════════════════════════
// ESTRUCTURA (lección T1.2): todo se define PRIMERO; la
// suscripción onSnapshot se registra AL FINAL. Con la caché
// persistente el primer snapshot puede llegar antes de que el
// módulo termine de evaluarse.
// ═══════════════════════════════════════════════════════════
import {
  db, collection, query, where, or, and, onSnapshot,
  doc, addDoc, updateDoc, deleteDoc, setDoc, getDoc, getDocs,
  serverTimestamp, arrayUnion, arrayRemove
} from './firebase-init.js';
import { CV2 } from './nucleo.js';
import { Core } from './actividades-core.js';

CV2.registrarSW();
const u = await CV2.verificarAuth();
CV2.renderNav('actividades');

const $ = (id) => document.getElementById(id);
const esc = CV2.esc;

// ═══ Estado ═══════════════════════════════════════════════
let byId = {};
let childrenOf = {};
let roots = [];
let abiertos = {};
let detalleAbierto = null;
let destacados = new Set();
let filtro = 'todas';
let editandoId = null;
let altaPadreId = null;
let equipo = [];
let crono = null;              // { actId, sesionId, inicioMs }
const horasCache = {};

const PALETA = ['#2a9d8f', '#e76f51', '#4361ee', '#b8860b', '#7209b7',
                '#2d5a27', '#c2185b', '#00838f', '#6d4c41', '#546e7a'];

// ═══ Helpers ══════════════════════════════════════════════
const diasEntre = (isoA, isoB) => Math.round((new Date(isoB) - new Date(isoA)) / 86400000);
const fmtCrono = (ms) => {
  const s = Math.floor(ms / 1000);
  const hh = Math.floor(s / 3600), mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0'),
        ss = String(s % 60).padStart(2, '0');
  return `${hh}:${mm}:${ss}`;
};

const raizDe = (id) => {
  let cur = byId[id], g = 0;
  while (cur?.parentId && byId[cur.parentId] && g++ < 25) cur = byId[cur.parentId];
  return cur ?? null;
};

const colorProy = (rootId) => {
  const r = byId[rootId];
  if (r?.color) return { a: r.color, p: CV2.pastelDe(r.color) };
  const i = roots.indexOf(rootId);
  const a = PALETA[(i < 0 ? PALETA.length - 1 : i) % PALETA.length];
  return { a, p: CV2.pastelDe(a) };
};

const esDescendiente = (id, ancestro) => {
  let cur = byId[id], g = 0;
  while (cur?.parentId && g++ < 25) {
    if (cur.parentId === ancestro) return true;
    cur = byId[cur.parentId];
  }
  return false;
};

// ═══ Semáforo ═════════════════════════════════════════════
function semaforo(it) {
  if (it.hecho) return { c: '#9aa69a', t: 'Terminada' };
  const hoy = CV2.hoyISO();
  if (it.prioridad === 'rojo') return { c: '#c0271f', t: 'Urgente' };

  const ciclo = it.recurrenciaDias ?? 0;
  if (ciclo > 0 && it.fechaInicio) {
    if (it.fechaInicio > hoy) return { c: '#cdd6cb', t: 'Vuelve el ' + CV2.fmtFecha(it.fechaInicio) };
    const atraso = diasEntre(it.fechaInicio, hoy);
    if (atraso <= Math.max(1, Math.round(ciclo * 0.25))) return { c: '#1f7a32', t: 'Toca hacerla' };
    if (atraso <= ciclo) return { c: '#b8860b', t: `Atrasada ${atraso}d` };
    return { c: '#c0271f', t: `Muy atrasada (${atraso}d)` };
  }

  if (it.fechaVencimiento && it.fechaVencimiento < hoy) return { c: '#c0271f', t: 'Vencida' };
  if (it.fechaVencimiento) {
    const dias = diasEntre(hoy, it.fechaVencimiento);
    if (dias <= 3) return { c: '#b8860b', t: `Vence en ${dias} día(s)` };
  }
  if (it.prioridad === 'amarillo') return { c: '#b8860b', t: 'Importante' };
  if (it.fechaInicio && it.fechaInicio > hoy) return { c: '#cdd6cb', t: 'Programada ' + CV2.fmtFecha(it.fechaInicio) };
  return { c: '#1f7a32', t: 'Al día' };
}

const esHoy = (it) => {
  if (it.hecho) return false;
  const s = semaforo(it);
  return s.t === 'Urgente' || s.t === 'Vencida' || s.t.startsWith('Vence')
    || s.t === 'Toca hacerla' || s.t.startsWith('Atrasada') || s.t.startsWith('Muy atrasada')
    || (it.fechaInicio && it.fechaInicio <= CV2.hoyISO());
};

const pasaFiltro = (it) => {
  if (filtro === 'destacadas') return destacados.has(it.id);
  if (filtro === 'hoy') return esHoy(it);
  return true;
};

function visible(id) {
  if (pasaFiltro(byId[id])) return true;
  return (childrenOf[id] ?? []).some(visible);
}

// ═══ Render ═══════════════════════════════════════════════
function renderBanner() {
  const b = $('bannerCrono');
  if (!crono) { b.innerHTML = ''; return; }
  const it = byId[crono.actId];
  const titulo = it?.titulo ?? crono.titulo ?? 'una actividad';
  b.innerHTML = `<div class="banner-crono">
    <span class="material-icons" style="font-size:26px;">timer</span>
    <span class="que">Cronómetro corriendo en<br><b>${esc(titulo)}</b></span>
    <span class="reloj crono-t" data-ini="${crono.inicioMs}">0:00:00</span>
    <button class="btn-stop" onclick="cronoStop('${crono.actId}')">
      <span class="material-icons">stop</span> STOP</button>
  </div>`;
}

function render() {
  renderBanner();
  const cont = $('arbol');
  if (roots.length === 0) {
    cont.innerHTML = `<div class="vacio">Todavía no hay proyectos.<br>Creá el primero con el botón <b>Proyecto</b>.</div>`;
    return;
  }
  const html = roots.filter(visible).map(nodoHTML).join('');
  cont.innerHTML = html || `<div class="vacio">Nada para mostrar con este filtro.</div>`;
}

function nodoHTML(id) {
  const it = byId[id];
  const hijos = (childrenOf[id] ?? []).filter(visible);
  const ab = abiertos[id] ?? false;
  const col = colorProy(raizDe(id)?.id ?? id);
  const s = semaforo(it);
  const esRaiz = !it.parentId;
  const star = destacados.has(id);
  const miCrono = crono?.actId === id;

  let chips = '';
  if (miCrono) chips += `<span class="crono">⏱ <span class="crono-t" data-ini="${crono.inicioMs}">0:00:00</span></span>`;
  if ((it.recurrenciaDias ?? 0) > 0) chips += `<span class="mini">↻ ${it.recurrenciaDias}d</span>`;
  if ((it.monto ?? 0) > 0) chips += `<span class="mini">${CV2.fmtMonto(it.monto)}</span>`;
  if (it.esCompra) chips += `<span class="mini">🛒</span>`;
  if (it.alcance === 'personal') chips += `<span class="mini">🔒</span>`;
  if (it.alcance === 'asignados') chips += `<span class="mini">👥 ${(it.competencias ?? []).length}</span>`;

  let h = `<div class="act-item" id="nodo-${id}">
    <div class="act-row${it.hecho ? ' hecha' : ''}" style="background:${col.p};${esRaiz ? `border-left:5px solid ${col.a};` : ''}"
         onclick="toggleDetalle('${id}')">
      <span class="caret" onclick="event.stopPropagation();toggleAbierto('${id}')">${hijos.length ? (ab ? '▾' : '▸') : ''}</span>
      ${star ? '<span class="material-icons estrella" style="font-size:17px;">star</span>' : ''}
      <span class="act-titulo">${esRaiz ? '📁 ' : ''}${esc(it.titulo)}
        ${it.detalle ? `<small>${esc(it.detalle)}</small>` : ''}</span>
      <span class="act-chips">${chips}</span>
      <span class="sem" style="background:${s.c}" title="${esc(s.t)}"></span>
    </div>`;

  if (detalleAbierto === id) {
    const partes = [s.t];
    if (it.ultimaRealizacion) partes.push(`última vez ${CV2.fmtFecha(it.ultimaRealizacion)}${it.ultimaRealizacionNombre ? ' (' + esc(it.ultimaRealizacionNombre) + ')' : ''}`);
    if (!(it.recurrenciaDias > 0) && it.fechaVencimiento && !s.t.startsWith('Vence') && s.t !== 'Vencida') partes.push('vence ' + CV2.fmtFecha(it.fechaVencimiento));
    partes.push(`<span id="hrs-${id}">${horasCache[id] != null ? CV2.fmtHM(horasCache[id]) + ' registradas' : '…'}</span>`);

    h += `<div class="act-detalle" style="background:${col.p}">
      <span class="texto-gris">${partes.join(' · ')}</span>
      <div class="acciones">
        ${!it.hecho ? (miCrono
          ? `<button class="btn-ico stop" onclick="cronoStop('${id}')" title="Frenar y registrar"><span class="material-icons">stop</span></button>`
          : `<button class="btn-ico play" onclick="cronoPlay('${id}')" title="Iniciar cronómetro"><span class="material-icons">play_arrow</span></button>`) : ''}
        ${!it.hecho && !miCrono ? `<button class="btn-ico" onclick="realizada('${id}')" title="Realizada sin cronómetro"><span class="material-icons" style="color:var(--ok)">task_alt</span></button>` : ''}
        ${it.hecho && CV2.esAdmin() ? `<button class="btn-ico" onclick="restaurar('${id}')" title="Restaurar"><span class="material-icons">restart_alt</span></button>` : ''}
        ${!it.hecho ? `<button class="btn-ico" onclick="abrirAlta('${id}')" title="Agregar sub-ítem"><span class="material-icons">add</span></button>` : ''}
        <button class="btn-ico" onclick="toggleEstrella('${id}')" title="Destacar">
          <span class="material-icons ${star ? 'estrella' : ''}">${star ? 'star' : 'star_outline'}</span></button>
        ${!it.hecho ? `<button class="btn-ico" onclick="abrirEdicion('${id}')" title="Editar"><span class="material-icons">edit</span></button>` : ''}
        ${(!it.hecho || CV2.esAdmin()) ? `<button class="btn-ico" onclick="borrar('${id}')" title="Eliminar"><span class="material-icons" style="color:var(--rojo)">delete</span></button>` : ''}
      </div>
    </div>`;
  }

  if (ab && hijos.length) {
    h += `<div class="act-children" style="border-left-color:${col.a}">${hijos.map(nodoHTML).join('')}</div>`;
  }
  return h + '</div>';
}

// ═══ Cronómetro ═══════════════════════════════════════════
window.cronoPlay = async (id) => {
  try {
    const r = await Core.iniciar(id, u);
    crono = { actId: id, sesionId: r.sesionId, inicioMs: r.inicioMs, titulo: byId[id]?.titulo ?? '' };
    render();
    CV2.toast('▶ Cronómetro corriendo', 'success');
  } catch (e) { CV2.toast(e.message, 'error'); }
};

window.cronoStop = async (id) => {
  const it = byId[id];
  let terminada = true;
  if ((it.recurrenciaDias ?? 0) > 0) {
    terminada = confirm('El tiempo trabajado se registra ahora.\n\n¿La actividad quedó TERMINADA por este ciclo?\n\nAceptar = sí (se reprograma)\nCancelar = todavía no (queda pendiente, con el tiempo ya registrado)');
  } else {
    if (!confirm('¿Frenar y registrar el tiempo trabajado?')) return;
  }
  try {
    const r = await Core.finalizar(id, u, terminada);
    crono = null;
    delete horasCache[id];
    render();
    CV2.toast(terminada
      ? `✅ ${CV2.fmtHM(r.horas)} registradas — ciclo cerrado`
      : `⏹ ${CV2.fmtHM(r.horas)} registradas — sigue pendiente`, 'success');
  } catch (e) {
    if (e.code === 'sin-sesion') {
      crono = null;
      render();
      CV2.toast(e.message, 'info');
    } else {
      CV2.toast(e.message, 'error');
    }
  }
};

// Si otra persona termina la actividad, mi cronómetro se frena en el
// servidor: verificar (con freno de 15s) para que la pantalla no
// muestre un reloj que ya no existe.
let _ultVerifCrono = 0;
async function verificarCrono() {
  if (!crono || Date.now() - _ultVerifCrono < 15000) return;
  _ultVerifCrono = Date.now();
  try {
    const a = await Core.sesionActiva(u.uid);
    if (!a || a.id !== crono.sesionId) {
      crono = null;
      render();
      CV2.toast('Tu cronómetro fue frenado: la actividad se dio por terminada y tus horas quedaron registradas', 'info');
    }
  } catch { /* silencioso */ }
}
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { _ultVerifCrono = 0; verificarCrono(); }
});

window.realizada = async (id) => {
  try {
    const r = await Core.tildar(id, u);
    delete horasCache[id];
    CV2.toast(r.recurrente
      ? `↻ Hecha — vuelve el ${CV2.fmtFecha(r.proxima)}`
      : '✔ Terminada (queda tachada hasta que un admin la elimine)', 'success');
  } catch (e) { CV2.toast(e.message, 'error'); }
};

window.restaurar = async (id) => {
  try {
    await updateDoc(doc(db, 'actividades', id), {
      hecho: false, estado: 'pendiente', hechoPor: null, hechoEn: null,
      actualizadoEn: serverTimestamp()
    });
    CV2.toast('Restaurada', 'success');
  } catch { CV2.toast('No se pudo restaurar', 'error'); }
};

// Reloj vivo (un intervalo único)
setInterval(() => {
  document.querySelectorAll('.crono-t').forEach((el) => {
    el.textContent = fmtCrono(Date.now() - Number(el.dataset.ini));
  });
}, 1000);

// ═══ Interacción del árbol ════════════════════════════════
window.toggleAbierto = (id) => { abiertos[id] = !abiertos[id]; render(); };

window.toggleDetalle = (id) => {
  detalleAbierto = detalleAbierto === id ? null : id;
  render();
  // Siempre fresco: el Gestor de Sesiones puede haber alterado el
  // registro. La agregación va al servidor, no a la caché.
  if (detalleAbierto === id) {
    Core.horasDeActividad(id).then((h) => {
      horasCache[id] = h;
      const el = document.getElementById('hrs-' + id);
      if (el) el.textContent = CV2.fmtHM(h) + ' registradas';
    }).catch(() => {});
  }
};

window.toggleEstrella = async (id) => {
  const tiene = destacados.has(id);
  tiene ? destacados.delete(id) : destacados.add(id);
  render();
  try {
    await setDoc(doc(db, 'estado_usuario', u.uid), {
      destacados: tiene ? arrayRemove(id) : arrayUnion(id),
      actualizadoEn: serverTimestamp()
    }, { merge: true });
  } catch { CV2.toast('No se pudo guardar la estrella', 'error'); }
};

window.borrar = async (id) => {
  const it = byId[id];
  if (it.hecho && !CV2.esAdmin()) {
    CV2.toast('Las terminadas solo las elimina un administrador', 'error');
    return;
  }
  if ((childrenOf[id] ?? []).length) {
    CV2.toast('Tiene sub-ítems: movelos o borralos primero', 'error');
    return;
  }
  if (!confirm(`¿Borrar "${it.titulo}"? No se puede deshacer.`)) return;
  try {
    await deleteDoc(doc(db, 'actividades', id));
    if (detalleAbierto === id) detalleAbierto = null;
    CV2.toast('Borrada', 'success');
  } catch (e) { CV2.toast('No se pudo borrar: ' + (e.code ?? e.message), 'error'); }
};

$('filtros').addEventListener('click', (ev) => {
  const b = ev.target.closest('.fchip');
  if (!b) return;
  filtro = b.dataset.f;
  document.querySelectorAll('.fchip').forEach((x) => x.classList.toggle('activo', x === b));
  render();
});

// ═══ Modal alta/edición ═══════════════════════════════════
const modal = $('modal');

function opcionesPadre(excluirId) {
  const op = [];
  const bajar = (id, nivel) => {
    if (id === excluirId || (excluirId && esDescendiente(id, excluirId))) return;
    const sang = '\u00A0'.repeat(nivel * 4);
    op.push(`<option value="${id}">${sang}${nivel === 0 ? '🏠 ' : '· '}${esc(byId[id].titulo)}</option>`);
    (childrenOf[id] ?? []).forEach((h) => bajar(h, nivel + 1));
  };
  roots.forEach((r) => bajar(r, 0));
  return op.join('');
}

function prepararModal({ titulo, esProyecto, padreId, it }) {
  $('mTitulo').textContent = titulo;
  $('grupoColor').classList.toggle('oculto', !esProyecto);
  $('grupoPadre').classList.toggle('oculto', esProyecto);
  if (!esProyecto) {
    $('fPadre').innerHTML = opcionesPadre(it?.id ?? null);
    $('fPadre').value = padreId ?? it?.parentId ?? roots[0] ?? '';
  }
  $('fTitulo').value = it?.titulo ?? '';
  $('fDetalle').value = it?.detalle ?? '';
  $('fColor').value = it?.color ?? '#2d5a27';
  $('fAlcance').value = it?.alcance ?? 'equipo';
  $('fPrioridad').value = it?.prioridad ?? '';
  $('fRecurrencia').value = it?.recurrenciaDias ?? 0;
  $('fMonto').value = it?.monto ?? 0;
  $('fFechaInicio').value = it?.fechaInicio ?? '';
  $('fFechaVenc').value = it?.fechaVencimiento ?? '';
  $('fEsCompra').checked = it?.esCompra ?? false;
  $('fProveedor').value = it?.proveedor ?? '';
  $('fProveedor').classList.toggle('oculto', !$('fEsCompra').checked);

  const sel = new Set(it?.competencias ?? []);
  $('fCompetencias').innerHTML = equipo.length
    ? equipo.map((p) => `<label class="check-linea" style="margin:0;">
        <input type="checkbox" class="chkComp" value="${p.uid}" ${sel.has(p.uid) ? 'checked' : ''}>
        <span>${esc(p.nombre)}</span></label>`).join('')
    : '<span class="texto-gris">Todavía no hay otros usuarios cargados en el equipo.</span>';
  $('grupoCompetencias').classList.toggle('oculto', $('fAlcance').value !== 'asignados');
  modal.showModal();
  $('fTitulo').focus();
}

$('btnNuevoProyecto').addEventListener('click', () => {
  editandoId = null; altaPadreId = null;
  prepararModal({ titulo: 'Nuevo proyecto', esProyecto: true });
});
window.abrirAlta = (padreId) => {
  editandoId = null; altaPadreId = padreId;
  prepararModal({ titulo: 'Nueva actividad', esProyecto: false, padreId });
};
window.abrirEdicion = (id) => {
  editandoId = id; altaPadreId = null;
  const it = byId[id];
  prepararModal({ titulo: 'Editar', esProyecto: !it.parentId, it });
};

$('fEsCompra').addEventListener('change', () =>
  $('fProveedor').classList.toggle('oculto', !$('fEsCompra').checked));
$('fAlcance').addEventListener('change', () =>
  $('grupoCompetencias').classList.toggle('oculto', $('fAlcance').value !== 'asignados'));
$('mCerrar').addEventListener('click', () => modal.close());
$('mCancelar').addEventListener('click', () => modal.close());

$('mGuardar').addEventListener('click', async () => {
  const titulo = $('fTitulo').value.trim();
  if (!titulo) { CV2.toast('Falta el título', 'error'); return; }
  const esProyecto = !$('grupoColor').classList.contains('oculto');

  const datos = {
    titulo,
    detalle: $('fDetalle').value.trim(),
    tipo: 'normal',
    parentId: esProyecto ? null : ($('fPadre').value || null),
    alcance: $('fAlcance').value,
    prioridad: $('fPrioridad').value || null,
    recurrenciaDias: Math.max(0, parseInt($('fRecurrencia').value) || 0),
    monto: Math.max(0, parseFloat($('fMonto').value) || 0),
    fechaInicio: $('fFechaInicio').value || null,
    fechaVencimiento: $('fFechaVenc').value || null,
    esCompra: $('fEsCompra').checked,
    proveedor: $('fEsCompra').checked ? ($('fProveedor').value.trim() || null) : null,
    competencias: $('fAlcance').value === 'asignados'
      ? [...document.querySelectorAll('.chkComp:checked')].map((c) => c.value)
      : [],
    actualizadoEn: serverTimestamp()
  };
  if (esProyecto) datos.color = $('fColor').value;
  if (!esProyecto && !datos.parentId) { CV2.toast('Elegí a qué proyecto pertenece', 'error'); return; }
  if (datos.alcance === 'asignados' && datos.competencias.length === 0) {
    CV2.toast('Elegí al menos una persona para el alcance asignados', 'error');
    return;
  }

  $('mGuardar').disabled = true;
  try {
    if (editandoId) {
      await updateDoc(doc(db, 'actividades', editandoId), datos);
      CV2.toast('Guardada', 'success');
    } else {
      await addDoc(collection(db, 'actividades'), {
        ...datos,
        hecho: false,
        estado: 'pendiente',
        sesionActualId: null,
        ultimoCierreEn: null,
        orden: (childrenOf[datos.parentId ?? ''] ?? []).length,
        creadoEn: serverTimestamp(),
        creadoPor: u.uid,
        creadoNombre: u.nombre
      });
      if (datos.parentId) abiertos[datos.parentId] = true;
      CV2.toast('Creada', 'success');
    }
    modal.close();
  } catch (e) {
    CV2.toast('No se pudo guardar: ' + (e.code ?? e.message), 'error');
  } finally {
    $('mGuardar').disabled = false;
  }
});

// ═══ Cargas iniciales (antes de suscribirse) ══════════════
try {
  const su = await getDocs(collection(db, 'usuarios'));
  su.forEach((d) => {
    const x = d.data();
    if (x.activo === true && d.id !== u.uid) equipo.push({ uid: d.id, nombre: x.nombre ?? d.id });
  });
  equipo.sort((a, b) => a.nombre.localeCompare(b.nombre));
} catch { /* sin equipo todavía */ }

try {
  const eu = await getDoc(doc(db, 'estado_usuario', u.uid));
  destacados = new Set(eu.exists() ? (eu.data().destacados ?? []) : []);
} catch { /* primera vez */ }

// Restaurar mi cronómetro si quedó corriendo (sobrevive recargas)
try {
  const activa = await Core.sesionActiva(u.uid);
  if (activa) {
    crono = { actId: activa.actividadId, sesionId: activa.id,
              inicioMs: activa.inicio.toMillis(), titulo: activa.actividadTitulo ?? '' };
    renderBanner();   // lo primero que se ve al volver, incluso antes de los datos
  }
} catch { /* sin sesión activa */ }

// ═══ Suscripción en vivo — SIEMPRE AL FINAL ═══════════════
if (typeof Core.consultaActividades !== 'function') {
  $('arbol').innerHTML = '<div class="vacio">La app quedó a medio actualizar.<br><b>Cerrala del todo y volvé a abrirla.</b></div>';
  throw new Error('core desactualizado');
}
const consulta = Core.consultaActividades(u, CV2.esAdmin());

onSnapshot(consulta, (snap) => {
  byId = {}; childrenOf = {};
  snap.forEach((d) => { byId[d.id] = { id: d.id, ...d.data() }; });
  for (const it of Object.values(byId)) {
    (childrenOf[it.parentId ?? ''] ??= []).push(it.id);
  }
  for (const arr of Object.values(childrenOf)) {
    arr.sort((a, b) => (byId[a].orden ?? 0) - (byId[b].orden ?? 0)
      || String(byId[a].titulo ?? '').localeCompare(String(byId[b].titulo ?? '')));
  }
  roots = (childrenOf[''] ?? []).slice()
    .sort((a, b) => String(byId[a].titulo ?? '').localeCompare(String(byId[b].titulo ?? '')));
  render();
  verificarCrono();
}, (e) => { console.error(e); CV2.toast('No se pudieron cargar las actividades (' + (e.code ?? e.message) + ')', 'error'); });
</script>
</body>
</html>
