<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CasaVerde 2.0 · Cobros</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2d5a27">
<style>
  .kpis { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
  .kpi { background: #fff; border: 1px solid var(--linea); border-radius: var(--radio);
         padding: 10px 16px; box-shadow: var(--sombra); }
  .kpi b { display: block; font-size: 1.2rem; }
  .kpi span { font-size: .78rem; color: var(--gris); }
  .hon {
    display: flex; align-items: center; gap: 10px; background: #fff;
    border: 1px solid var(--linea); border-radius: var(--radio);
    padding: 10px 12px; margin: 6px 0; box-shadow: var(--sombra); font-size: .9rem;
  }
  .hon .info { flex: 1; min-width: 0; }
  .hon .info small { display: block; color: var(--gris); font-size: .76rem; }
  .hon .monto { font-weight: 700; white-space: nowrap; }
  .estado {
    font-size: .72rem; padding: 3px 10px; border-radius: 999px; white-space: nowrap;
  }
  .estado.pendiente { background: #fdf1d8; color: #8a6206; }
  .estado.pagado { background: var(--verde-claro); color: var(--verde-osc); }
  .chip-dinero { font-size: .68rem; padding: 3px 8px; border-radius: 999px;
    background: #eef4fb; color: #33506e; white-space: nowrap; }
  .persona-t { margin: 16px 0 4px; font-size: .95rem; color: var(--verde-osc); }
  .btn-pagar {
    border: 1px solid var(--ok); background: #fff; color: var(--ok); border-radius: 7px;
    padding: 5px 10px; font: inherit; font-size: .8rem; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .btn-registrar {
    border: 1px solid #33506e; background: #fff; color: #33506e; border-radius: 7px;
    padding: 4px 9px; font: inherit; font-size: .74rem; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
  }
  .btn-nota {
    border: 0; background: none; color: var(--gris); cursor: pointer;
    padding: 4px; display: inline-flex; opacity: .55;
  }
  .btn-nota:hover { opacity: 1; }
  .vacio { text-align: center; color: var(--gris); padding: 30px 10px; }
  dialog { border: 0; border-radius: 14px; padding: 16px; width: min(420px, 92vw);
    box-shadow: 0 10px 40px rgba(0,0,0,.25); }
  dialog::backdrop { background: rgba(20,30,18,.45); }
  .check-linea { display: flex; align-items: flex-start; gap: 9px; margin: 14px 0 0; }
  .check-linea input { width: auto; flex: none; margin-top: 3px; }
  .check-linea small { display: block; color: var(--gris); font-size: .76rem; }
</style>
</head>
<body>

<div id="nav"></div>

<div class="contenedor">
  <h1 id="titulo">Cobros</h1>
  <p class="texto-gris" style="margin-top:-6px;">Los honorarios se generan solos al cerrar
  el ciclo de una actividad <b>con precio</b>, repartidos según las horas de cada uno.</p>

  <div class="kpis">
    <div class="kpi"><b id="kPend">—</b><span>Pendiente de pago</span></div>
    <div class="kpi"><b id="kPag">—</b><span>Ya pagado</span></div>
  </div>

  <div id="lista"><div class="vacio">Cargando…</div></div>
</div>

<dialog id="mEdit">
  <h2 style="margin:0 0 4px;">Editar registro</h2>
  <p class="texto-gris" id="meQue" style="margin:0;"></p>
  <label>Monto (R$)</label>
  <input id="meMonto" type="number" min="0" step="0.01" inputmode="decimal">
  <label>Comentario del administrador</label>
  <textarea id="meNota" rows="3" placeholder="Aclaración sobre este registro…"></textarea>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
    <button class="btn" id="meCancelar">Cancelar</button>
    <button class="btn btn-primario" id="meGuardar"><span class="material-icons">save</span> Guardar</button>
  </div>
</dialog>

<dialog id="mPagar">
  <h2 style="margin:0 0 4px;">Pagar honorario</h2>
  <p class="texto-gris" id="mpQue" style="margin:0 0 10px;"></p>

  <div style="display:flex;gap:10px;">
    <div style="flex:1;"><label>Monto (R$)</label>
      <input id="mpMonto" type="number" min="0" step="0.01" inputmode="decimal" readonly
        style="background:#f6f6f4;"></div>
    <div style="flex:1;"><label>Fecha del pago</label>
      <input id="mpFecha" type="date"></div>
  </div>

  <label>¿De qué cuenta sale?</label>
  <select id="mpCuenta"></select>

  <label class="check-linea">
    <input id="mpDinero" type="checkbox" checked>
    <span>Registrar la salida en Dinero
      <small>Crea el movimiento de salida en el libro del negocio, categoría
        Honorarios, a nombre de quien cobra, desde la cuenta elegida.</small></span>
  </label>

  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
    <button class="btn" id="mpCancelar">Cancelar</button>
    <button class="btn btn-primario" id="mpConfirmar"><span class="material-icons">paid</span> Pagar</button>
  </div>
</dialog>

<script type="module">
// Regla del 2.0: definiciones primero, suscripción AL FINAL.
//
// T3.3b — al marcar un honorario como pagado, el sistema puede crear
// SOLO el movimiento de salida correspondiente en /movimientos/.
// El vínculo (honorario.movimientoId ↔ movimiento.refId) es lo que
// garantiza que tocar dos veces no duplique la plata.
import {
  db, collection, query, where, onSnapshot, getDocs, doc, addDoc, updateDoc, serverTimestamp
} from './firebase-init.js';
import { CV2 } from './nucleo.js';

CV2.registrarSW();
const u = await CV2.verificarAuth();
CV2.renderNav('honorarios');

const $ = (id) => document.getElementById(id);
const esc = CV2.esc;
let docs = [];

if (CV2.puede('finanzas')) $('titulo').textContent = 'Honorarios del equipo';

function render() {
  let pend = 0, pag = 0;
  for (const h of docs) (h.estado === 'pagado' ? pag += h.monto : pend += h.monto);
  $('kPend').textContent = CV2.fmtMonto(pend);
  $('kPag').textContent = CV2.fmtMonto(pag);

  const cont = $('lista');
  if (!docs.length) {
    cont.innerHTML = `<div class="vacio">Todavía no hay honorarios.<br>
      Aparecen al cerrar el ciclo de una actividad con precio.</div>`;
    return;
  }

  const fila = (h) => `<div class="hon">
    <div class="info">${esc(h.concepto ?? 'Actividad')}
      <small>${CV2.fmtFecha(h.cicloCerradoEn)} · ${CV2.fmtHM(h.horas ?? 0)}</small>
      ${h.nota ? `<small style="font-style:italic;color:#7a6a2e;">💬 ${esc(h.nota)}</small>` : ''}
    </div>
    <span class="monto">${CV2.fmtMonto(h.monto)}</span>
    <span class="estado ${h.estado}">${h.estado === 'pagado' ? '✓ Pagado' : 'Pendiente'}</span>
    ${h.movimientoId ? '<span class="chip-dinero">→ en Dinero</span>' : ''}
    ${CV2.puede('finanzas') && h.estado === 'pagado' && !h.movimientoId
      ? `<button class="btn-registrar" onclick="registrarEnDinero('${h.id}')" title="Crear el movimiento de salida que falta"><span class="material-icons" style="font-size:14px;">savings</span> A Dinero</button>`
      : ''}
    ${CV2.puede('finanzas')
      ? `<button class="btn-nota" onclick="editar('${h.id}')" title="Editar / comentar"><span class="material-icons" style="font-size:16px;">edit_note</span></button>`
      : ''}
    ${CV2.puede('finanzas') && h.estado !== 'pagado'
      ? `<button class="btn-pagar" onclick="pagar('${h.id}')"><span class="material-icons" style="font-size:15px;">paid</span> Pagar</button>`
      : ''}
  </div>`;

  if (CV2.puede('finanzas')) {
    // Agrupado por persona, pendientes primero
    const porUid = {};
    for (const h of docs) (porUid[h.uid] ??= { nombre: h.nombre ?? h.uid, items: [], pend: 0 }).items.push(h);
    for (const g of Object.values(porUid)) g.pend = g.items.reduce((a, x) => a + (x.estado !== 'pagado' ? x.monto : 0), 0);
    cont.innerHTML = Object.values(porUid)
      .sort((a, b) => b.pend - a.pend || a.nombre.localeCompare(b.nombre))
      .map((g) => `<div class="persona-t">👤 <b>${esc(g.nombre)}</b> — pendiente ${CV2.fmtMonto(g.pend)}</div>`
        + g.items.map(fila).join(''))
      .join('');
  } else {
    cont.innerHTML = docs.map(fila).join('');
  }
}

// ═══ Editar / comentar ════════════════════════════════════
let editId = null;
window.editar = (id) => {
  const h = docs.find((x) => x.id === id);
  if (!h) return;
  editId = id;
  $('meQue').textContent = `${h.nombre ?? ''} · ${h.concepto ?? ''} · ${CV2.fmtFecha(h.cicloCerradoEn)}`;
  $('meMonto').value = h.monto ?? 0;
  $('meNota').value = h.nota ?? '';
  $('mEdit').showModal();
};
$('meCancelar').addEventListener('click', () => $('mEdit').close());
$('meGuardar').addEventListener('click', async () => {
  try {
    await updateDoc(doc(db, 'honorarios', editId), {
      monto: Math.max(0, parseFloat($('meMonto').value) || 0),
      nota: $('meNota').value.trim() || null,
      actualizadoEn: serverTimestamp()
    });
    $('mEdit').close();
    CV2.toast('Guardado', 'success');
  } catch (e) { CV2.toast('No se pudo: ' + (e.code ?? e.message), 'error'); }
});

// ═══ El puente con Dinero ═════════════════════════════════
/**
 * Crea el movimiento de salida del honorario y devuelve su id.
 * NO se llama si el honorario ya tiene movimientoId: el vínculo es
 * lo que impide pagar dos veces la misma plata.
 */
async function crearMovimiento(h, fecha, cuenta) {
  const ref = await addDoc(collection(db, 'movimientos'), {
    fecha: fecha || CV2.hoyISO(),
    tipo: 'salio',
    monto: Number(h.monto) || 0,
    moneda: 'BRL',
    montoBRL: Number(h.monto) || 0,
    categoria: 'Honorarios',
    cuenta: cuenta || null,
    uid: h.uid,                       // quien cobra
    nombre: h.nombre ?? '',
    detalle: 'Honorario — ' + (h.concepto ?? 'Actividad'),
    comprobanteUrl: null,
    pendiente: null,                  // ya pagado: no queda nada colgando
    refTipo: 'honorario',
    refId: h.id,
    creadoEn: serverTimestamp(),
    creadoPor: u.uid,
    creadoNombre: u.nombre ?? '',
    actualizadoEn: serverTimestamp()
  });
  return ref.id;
}

let pagarId = null;
// Cuentas ya usadas en movimientos, para ofrecerlas en el pago.
async function cargarCuentas(sel) {
  let cuentas = [];
  try {
    const snap = await getDocs(collection(db, 'movimientos'));
    const set = new Set();
    snap.forEach((d) => { const c = d.data().cuenta; if (c) set.add(c); });
    cuentas = [...set].sort();
  } catch { /* sin permiso o vacío */ }
  sel.innerHTML = '<option value="">(sin definir)</option>'
    + cuentas.map((c) => '<option value="' + esc(c) + '">' + esc(c) + '</option>').join('')
    + '<option value="__nueva">➕ Agregar nueva…</option>';
}
$('mpCuenta').addEventListener('change', () => {
  if ($('mpCuenta').value !== '__nueva') return;
  const nombre = (prompt('Nombre de la cuenta de donde sale el pago:') ?? '').trim();
  if (!nombre) { $('mpCuenta').value = ''; return; }
  const opt = document.createElement('option');
  opt.value = nombre; opt.textContent = nombre; opt.selected = true;
  $('mpCuenta').insertBefore(opt, $('mpCuenta').lastElementChild);
});

window.pagar = async (id) => {
  const h = docs.find((x) => x.id === id);
  if (!h) return;
  pagarId = id;
  $('mpQue').textContent = `${h.nombre ?? ''} · ${h.concepto ?? ''}`;
  $('mpMonto').value = Number(h.monto ?? 0).toFixed(2);
  $('mpFecha').value = CV2.hoyISO();
  $('mpDinero').checked = !h.movimientoId;
  $('mpDinero').disabled = !!h.movimientoId;
  await cargarCuentas($('mpCuenta'));
  $('mPagar').showModal();
};
$('mpCancelar').addEventListener('click', () => $('mPagar').close());

$('mpConfirmar').addEventListener('click', async () => {
  const h = docs.find((x) => x.id === pagarId);
  if (!h) return;
  $('mpConfirmar').disabled = true;
  try {
    let movimientoId = h.movimientoId ?? null;
    if ($('mpDinero').checked && !movimientoId) {
      movimientoId = await crearMovimiento(h, $('mpFecha').value, $('mpCuenta').value);
    }
    await updateDoc(doc(db, 'honorarios', pagarId), {
      estado: 'pagado',
      pagadoEn: serverTimestamp(),
      pagadoFecha: $('mpFecha').value || CV2.hoyISO(),
      movimientoId,
      actualizadoEn: serverTimestamp()
    });
    $('mPagar').close();
    CV2.toast(movimientoId ? '✓ Pagado y registrado en Dinero' : '✓ Pagado', 'success');
  } catch (e) {
    CV2.toast('No se pudo: ' + (e.code ?? e.message), 'error');
  } finally { $('mpConfirmar').disabled = false; }
});

/** Para los honorarios que se pagaron ANTES de existir este puente. */
window.registrarEnDinero = async (id) => {
  const h = docs.find((x) => x.id === id);
  if (!h || h.movimientoId) return;
  if (!confirm(`¿Registrar en Dinero la salida de ${CV2.fmtMonto(h.monto)} a ${h.nombre ?? ''}?`)) return;
  try {
    const movimientoId = await crearMovimiento(h, CV2.hoyISO());
    await updateDoc(doc(db, 'honorarios', id), { movimientoId, actualizadoEn: serverTimestamp() });
    CV2.toast('✓ Registrado en Dinero', 'success');
  } catch (e) { CV2.toast('No se pudo: ' + (e.code ?? e.message), 'error'); }
};

// ═══ Suscripción — AL FINAL ═══════════════════════════════
const col = collection(db, 'honorarios');
const consulta = CV2.puede('finanzas') ? query(col) : query(col, where('uid', '==', u.uid));

onSnapshot(consulta, (snap) => {
  docs = [];
  snap.forEach((d) => docs.push({ id: d.id, ...d.data() }));
  docs.sort((a, b) => (b.cicloCerradoEn?.toMillis?.() ?? 0) - (a.cicloCerradoEn?.toMillis?.() ?? 0));
  render();
}, (e) => { console.error(e); CV2.toast('No se pudieron cargar los honorarios', 'error'); });
</script>
</body>
</html>
