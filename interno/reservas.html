<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CasaVerde 2.0 · Reservas</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2d5a27">
<style>
  .filtros { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .fchip { border: 1px solid var(--linea); background: #fff; border-radius: 999px;
    padding: 6px 14px; font: inherit; font-size: .84rem; cursor: pointer; color: var(--gris); }
  .fchip.activo { background: var(--verde); border-color: var(--verde); color: #fff; }

  .res {
    background: #fff; border: 1px solid var(--linea); border-radius: var(--radio);
    padding: 11px 12px; margin: 7px 0; box-shadow: var(--sombra); cursor: pointer;
  }
  .res .fila1 { display: flex; align-items: center; gap: 8px; }
  .res .quien { flex: 1; min-width: 0; font-weight: 600; font-size: .95rem; overflow-wrap: anywhere; }
  .res .fila2 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: .8rem; color: var(--gris); margin-top: 4px; }
  .cab { font-size: .72rem; padding: 3px 10px; border-radius: 999px; font-weight: 700; white-space: nowrap; }
  .est { font-size: .72rem; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
  .est.presupuesto { background: #e8ecfd; color: #2b3f9e; }
  .est.confirmada { background: var(--verde-claro); color: var(--verde-osc); }
  .est.finalizada { background: #eee; color: #666; }
  .est.anulada { background: #fde4e2; color: #8f1d17; }
  .encasa { background: #123c0e; color: #d9f2d3; font-size: .72rem; padding: 3px 10px; border-radius: 999px; }
  .detalle { border-top: 1px dashed var(--linea); margin-top: 8px; padding-top: 8px; font-size: .85rem; }
  .detalle .acciones { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .btn-ico { border: 1px solid var(--linea); background: #fff; border-radius: 7px;
    padding: 5px 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
    font: inherit; font-size: .8rem; color: var(--tinta); line-height: 1; }
  .btn-ico .material-icons { font-size: 16px; }
  .hist { font-size: .76rem; color: var(--gris); margin-top: 6px; }
  .vacio { text-align: center; color: var(--gris); padding: 30px 10px; }

  dialog { border: 0; border-radius: 14px; padding: 16px; width: min(500px, 94vw);
    max-height: 88dvh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,.25); }
  dialog::backdrop { background: rgba(20,30,18,.45); }
  .fila2c { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>

<div id="nav"></div>

<div class="contenedor">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <h1 style="margin-right:auto;">Reservas</h1>
    <button class="btn oculto" id="btnAirbnb" title="Sincronizar con los calendarios de Airbnb">
      <span class="material-icons">sync</span> Airbnb
    </button>
    <button class="btn btn-primario" id="btnNueva">
      <span class="material-icons">add</span> Reserva
    </button>
  </div>

  <div class="filtros" id="filtros">
    <button class="fchip activo" data-f="vigentes">Vigentes</button>
    <button class="fchip" data-f="presupuesto">Presupuestos</button>
    <button class="fchip" data-f="confirmada">Confirmadas</button>
    <button class="fchip" data-f="finalizada">Finalizadas</button>
    <button class="fchip" data-f="todas">Todas</button>
  </div>

  <div id="lista"><div class="vacio">Cargando…</div></div>
</div>

<dialog id="modal">
  <h2 id="mTit" style="margin:0 0 6px;">Nueva reserva</h2>

  <label>Huésped</label>
  <select id="fCliente"></select>
  <input id="fNombre" maxlength="80" placeholder="Nombre del huésped" class="oculto" style="margin-top:6px;">

  <label>Cabaña</label>
  <select id="fCabana"></select>

  <div class="fila2c">
    <div><label>Entrada</label><input id="fIn" type="date"></div>
    <div><label>Salida</label><input id="fOut" type="date"></div>
  </div>
  <div class="fila2c">
    <div><label>Hora de entrada</label><input id="fHoraIn" type="time" value="14:00"></div>
    <div><label>Hora de salida</label><input id="fHoraOut" type="time" value="10:00"></div>
  </div>
  <p class="texto-gris" id="calcNoches" style="margin:6px 0 0;"></p>

  <div class="fila2c">
    <div><label>Adultos</label><input id="fAdultos" type="number" min="1" step="1" value="2" inputmode="numeric"></div>
    <div><label>Niños</label><input id="fNinos" type="number" min="0" step="1" value="0" inputmode="numeric"></div>
  </div>

  <div class="fila2c">
    <div><label>Moneda de la reserva</label>
      <select id="fMonedaRes">
        <option value="BRL">R$ Reales</option>
        <option value="USD">U$D Dólares</option>
        <option value="UYU">$U Pesos uruguayos</option>
      </select></div>
    <div><label>Total</label><input id="fTotal" type="number" min="0" step="0.01" inputmode="decimal"></div>
    <div><label>Estado</label>
      <select id="fEstado">
        <option value="presupuesto">Presupuesto</option>
        <option value="confirmada">Confirmada</option>
      </select>
    </div>
  </div>

  <label>Notas</label>
  <textarea id="fNotas" rows="2"></textarea>

  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
    <button class="btn" id="mCancelar">Cancelar</button>
    <button class="btn btn-primario" id="mGuardar"><span class="material-icons">save</span> Guardar</button>
  </div>
</dialog>

<dialog id="mPago" style="border:0;border-radius:14px;padding:16px;width:min(420px,92vw);box-shadow:0 10px 40px rgba(0,0,0,.25);">
  <h2 style="margin:0 0 4px;">Registrar pago</h2>
  <p class="texto-gris" id="pQuien" style="margin:0;"></p>
  <div class="fila2c">
    <div><label>Concepto</label>
      <select id="pConcepto">
        <option value="sena">Seña</option>
        <option value="saldo">Saldo</option>
        <option value="otro">Otro pago</option>
      </select></div>
    <div><label>Método</label>
      <select id="pMetodo">
        <option value="pix">Pix</option>
        <option value="efectivo">Efectivo</option>
        <option value="transferencia">Transferencia</option>
        <option value="airbnb">Airbnb</option>
        <option value="otro">Otro</option>
      </select></div>
  </div>
  <div class="fila2c">
    <div><label>Moneda</label>
      <select id="pMoneda">
        <option value="BRL">R$ Reales</option>
        <option value="USD">U$D Dólares</option>
        <option value="UYU">$U Pesos uruguayos</option>
      </select></div>
    <div><label>Monto</label><input id="pMonto" type="number" min="0" step="0.01" inputmode="decimal"></div>
  </div>
  <div id="grupoEquiv" class="oculto">
    <label id="lblEquiv">Equivalente (al cambio de hoy)</label>
    <input id="pEquiv" type="number" min="0" step="0.01" inputmode="decimal">
    <p class="texto-gris" style="font-size:.78rem;margin:4px 0 0;">
      La reserva se lleva en su moneda: el equivalente es para que el saldo cierre.</p>
  </div>
  <div class="fila2c">
    <div><label>Categoría</label>
      <select id="pCategoria"></select></div>
    <div><label>Cuenta de destino</label>
      <select id="pCuenta"></select></div>
  </div>
  <label>Fecha</label>
  <input id="pFecha" type="date">
  <label>Nota (opcional)</label>
  <input id="pNota" maxlength="150">
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
    <button class="btn" id="pCancelar">Cancelar</button>
    <button class="btn btn-primario" id="pGuardar"><span class="material-icons">save</span> Guardar</button>
  </div>
</dialog>

<script type="module">
// Regla del 2.0: definiciones primero, suscripción AL FINAL.
import {
  db, collection, query, where, onSnapshot, getDocs,
  doc, addDoc, updateDoc, setDoc, deleteDoc, serverTimestamp, arrayUnion, Timestamp
} from './firebase-init.js';
import { CV2 } from './nucleo.js';
import { RCore } from './reservas-core.js';

CV2.registrarSW();
const u = await CV2.verificarAuth();
CV2.renderNav('reservas');

const $ = (id) => document.getElementById(id);
const esc = CV2.esc;

// ═══ Estado ═══════════════════════════════════════════════
let reservas = [];
let cabanas = [];              // [{id, nombre, color}]
let materializado = false;     // materializar una sola vez por carga
let pagos = [];                // colección plana; se agrupa por reservaId
let filtro = 'vigentes';
let abierta = null;
let editId = null;
let pagoReservaId = null;      // reserva a la que se registra un pago
let clientes = [];

// Derivados de dinero — NUNCA guardados (CONVENCIONES)
const pagosDe = (rid) => pagos.filter((p) => p.reservaId === rid)
  .sort((a, b) => (b.fecha ?? '').localeCompare(a.fecha ?? ''));
// Cada reserva vive en SU moneda de principio a fin. Un pago en otra moneda
// aporta su equivalente EN LA MONEDA DE LA RESERVA (no siempre en reales).
// Las reservas viejas no tienen 'moneda': se asumen en R$.
const monedaDe = (r) => (r && r.moneda) || 'BRL';
const totalDe = (r) => Number((r && (r.total ?? r.totalBRL)) || 0);
const aporte = (p, mon) =>
  Number(p.moneda === mon ? p.monto : (p.montoEquiv ?? p.montoBRL)) || 0;
const pagadoDe = (rid) => {
  const r = reservas.find((x) => x.id === rid);
  const mon = monedaDe(r);
  return pagosDe(rid).reduce((a, p) => a + aporte(p, mon), 0);
};
const tieneSena = (rid) => pagosDe(rid).some((p) => p.concepto === 'sena');

const COLORES_CAB = ['#2a9d8f', '#e76f51', '#4361ee', '#b8860b', '#7209b7'];

// ═══ Helpers ══════════════════════════════════════════════
const nombreCab = (id) => {
  const c = cabanas.find((x) => x.id === id);
  const n = c?.nombre;
  return typeof n === 'object' ? (n.es ?? n.pt ?? n.en ?? id) : (n ?? id);
};
const colorCab = (id) => {
  const i = cabanas.findIndex((x) => x.id === id);
  return COLORES_CAB[(i < 0 ? COLORES_CAB.length - 1 : i) % COLORES_CAB.length];
};
const noches = (r) => Math.max(0, Math.round((new Date(r.checkOut) - new Date(r.checkIn)) / 86400000));
const enCasa = (r) => r.estado === 'confirmada' && r.checkIn <= CV2.hoyISO() && r.checkOut > CV2.hoyISO();

const registrarCambio = (cambio) => arrayUnion({
  fecha: Timestamp.now(), autorUid: u.uid, autorNombre: u.nombre ?? '', cambio
});

// Solapamiento de fechas en la misma cabaña (solo confirmadas)
const conflicto = (cabanaId, ci, co, ignorarId) =>
  reservas.find((r) => r.id !== ignorarId && r.cabanaId === cabanaId &&
    r.estado === 'confirmada' && r.checkIn < co && r.checkOut > ci);

// ═══ Render ═══════════════════════════════════════════════
const pasaFiltro = (r) => {
  if (filtro === 'todas') return true;
  if (filtro === 'vigentes') return r.estado === 'presupuesto' ||
    (r.estado === 'confirmada' && r.checkOut >= CV2.hoyISO());
  return r.estado === filtro;
};

function render() {
  const fs = reservas.filter(pasaFiltro);
  const cont = $('lista');
  if (!fs.length) {
    cont.innerHTML = `<div class="vacio">${reservas.length ? 'Nada con este filtro.' : 'Sin reservas todavía.<br>Creá la primera con el botón <b>Reserva</b>.'}</div>`;
    return;
  }
  cont.innerHTML = fs.map((r) => {
    const col = colorCab(r.cabanaId);
    let h = `<div class="res" style="border-left:5px solid ${col};" onclick="abrir('${r.id}')">
      <div class="fila1">
        <span class="quien">${esc(r.clienteNombre)}</span>
        ${enCasa(r) ? '<span class="encasa">🏠 En casa</span>' : ''}
        ${r.origen === 'airbnb' ? '<span class="est" style="background:#fde8ec;color:#b0164a;">Airbnb</span>' : ''}
        <span class="est ${r.estado}">${r.estado}</span>
      </div>
      <div class="fila2">
        <span class="cab" style="background:${CV2.pastelDe(col)};color:${col};">${esc(nombreCab(r.cabanaId))}</span>
        <span>${CV2.fmtFecha(r.checkIn)} ${r.horaEntrada ?? '14:00'} → ${CV2.fmtFecha(r.checkOut)} ${r.horaSalida ?? '10:00'} · ${noches(r)} noche(s)</span>
        <span>👤 ${r.adultos}${r.ninos ? ' + ' + r.ninos + ' 🧒' : ''}</span>
        <span><b>${CV2.fmtMonto(totalDe(r), monedaDe(r))}</b></span>
        ${(() => {
          const pag = pagadoDe(r.id);
          const saldo = totalDe(r) - pag;
          if (pag <= 0) return r.estado === 'presupuesto' ? '' : '<span style="color:var(--rojo);">sin pagos</span>';
          return `<span style="color:${saldo > 0.01 ? 'var(--amarillo)' : 'var(--ok)'};">${saldo > 0.01 ? 'saldo ' + CV2.fmtMonto(saldo) : '✓ pagada'}</span>`;
        })()}
        ${tieneSena(r.id) && r.estado === 'presupuesto' ? '<span class="est" style="background:#fdf1d8;color:#8a6206;">señada</span>' : ''}
      </div>`;

    if (abierta === r.id) {
      const ultimos = (r.historial ?? []).slice(-3).reverse()
        .map((x) => `${CV2.fmtFecha(x.fecha)} · ${esc(x.autorNombre)}: ${esc(x.cambio)}`).join('<br>');
      const ps = pagosDe(r.id);
      const CONC = { sena: 'Seña', saldo: 'Saldo', otro: 'Pago' };
      h += `<div class="detalle" onclick="event.stopPropagation()">
        ${ps.length ? `<div style="margin-bottom:6px;">
          <b>Pagos</b> · pagado ${CV2.fmtMonto(pagadoDe(r.id), monedaDe(r))} de ${CV2.fmtMonto(totalDe(r), monedaDe(r))}
          ${ps.map((p) => `<div style="display:flex;gap:8px;align-items:center;font-size:.82rem;color:var(--gris);margin-top:3px;">
            <span>${CV2.fmtFecha(p.fecha)}</span>
            <span style="flex:1;">${CONC[p.concepto] ?? 'Pago'} · ${esc(p.metodo ?? '')}${p.categoria ? ' · ' + esc(p.categoria) : ''}${p.cuentaDestino ? ' → ' + esc(p.cuentaDestino) : ''}${p.nota ? ' · ' + esc(p.nota) : ''}</span>
            <b style="color:var(--tinta);">${CV2.fmtMonto(p.monto, p.moneda ?? 'BRL')}${p.moneda && p.moneda !== 'BRL' ? ' <span style="font-weight:400;color:var(--gris);">(≈' + CV2.fmtMonto(enBRL(p)) + ')</span>' : ''}</b>
            ${CV2.puede('finanzas') ? `<button class="btn-ico" style="border:0;padding:2px;" onclick="borrarPago('${p.id}')" title="Eliminar pago"><span class="material-icons" style="font-size:15px;color:var(--rojo)">delete_outline</span></button>` : ''}
          </div>`).join('')}
        </div>` : ''}
        ${r.notas ? `<div>📝 ${esc(r.notas)}</div>` : ''}
        ${ultimos ? `<div class="hist">${ultimos}</div>` : ''}
        <div class="acciones">
          ${CV2.puede('reservas') && r.estado === 'presupuesto'
            ? `<button class="btn-ico" style="border-color:var(--ok);color:var(--ok);" onclick="cambiarEstado('${r.id}','confirmada')"><span class="material-icons">check_circle</span> Confirmar</button>` : ''}
          ${CV2.puede('reservas') && r.estado === 'confirmada' && r.checkOut <= CV2.hoyISO()
            ? `<button class="btn-ico" onclick="cambiarEstado('${r.id}','finalizada')"><span class="material-icons">flag</span> Finalizar</button>` : ''}
          ${CV2.puede('reservas') && (r.estado === 'presupuesto' || r.estado === 'confirmada')
            ? `<button class="btn-ico" style="color:var(--rojo);" onclick="cambiarEstado('${r.id}','anulada')"><span class="material-icons">cancel</span> Anular</button>` : ''}
          ${CV2.puede('reservas') && r.estado !== 'anulada'
            ? `<button class="btn-ico" style="border-color:var(--verde);color:var(--verde-osc);" onclick="abrirPago('${r.id}')"><span class="material-icons">attach_money</span> Pago</button>` : ''}
          ${CV2.puede('reservas')
            ? `<button class="btn-ico" onclick="editar('${r.id}')"><span class="material-icons">edit</span> Editar</button>` : ''}
        </div>
      </div>`;
    }
    return h + '</div>';
  }).join('');
}

window.abrir = (id) => { abierta = abierta === id ? null : id; render(); };

// ═══ Cambios de estado (con historial) ════════════════════
window.cambiarEstado = async (id, nuevo) => {
  const r = reservas.find((x) => x.id === id);
  const textos = { confirmada: '¿Confirmar la reserva?', finalizada: '¿Marcar como finalizada?', anulada: '¿ANULAR esta reserva?' };
  if (!confirm(textos[nuevo])) return;

  if (nuevo === 'confirmada') {
    const c = conflicto(r.cabanaId, r.checkIn, r.checkOut, id);
    if (c && !confirm(`⚠ Se superpone con la reserva confirmada de ${c.clienteNombre} (${CV2.fmtFecha(c.checkIn)}→${CV2.fmtFecha(c.checkOut)}). ¿Confirmar igual?`)) return;
  }
  try {
    await updateDoc(doc(db, 'reservas', id), {
      estado: nuevo,
      historial: registrarCambio(`estado → ${nuevo}`),
      actualizadoEn: serverTimestamp()
    });
    CV2.toast(`Reserva ${nuevo}`, 'success');
    // Limpieza automática: confirmar la crea, anular la borra (si no se hizo)
    try {
      const s = await RCore.sincronizarLimpiezas([{ ...r, estado: nuevo }], cabanas, u);
      if (s.creadas) CV2.toast(`🧹 Limpieza creada para el ${CV2.fmtFecha(r.checkIn)}`, 'info');
      else if (nuevo === 'confirmada') CV2.toast(`La limpieza aparecerá una semana antes del ${CV2.fmtFecha(r.checkIn)}`, 'info');
      if (s.borradas) CV2.toast('🧹 Limpieza cancelada', 'info');
    } catch (e2) {
      console.warn('limpiezas:', e2);
      CV2.toast('No se pudo crear la limpieza: ' + (e2.code ?? e2.message), 'error');
    }
  } catch (e) { CV2.toast('No se pudo: ' + (e.code ?? e.message), 'error'); }
};

// ═══ Alta / edición ═══════════════════════════════════════
const calcN = () => {
  const ci = $('fIn').value, co = $('fOut').value;
  if (!ci || !co) { $('calcNoches').textContent = ''; return; }
  const n = Math.round((new Date(co) - new Date(ci)) / 86400000);
  $('calcNoches').textContent = n > 0 ? `= ${n} noche(s)` : '⚠ la salida debe ser después de la entrada';
};
['fIn', 'fOut'].forEach((i) => $(i).addEventListener('input', calcN));

function abrirModal(r) {
  editId = r?.id ?? null;
  $('mTit').textContent = editId ? 'Editar reserva' : 'Nueva reserva';
  $('fCabana').innerHTML = cabanas.map((c) =>
    `<option value="${c.id}">${esc(nombreCab(c.id))}</option>`).join('');

  // Selector de cliente: ficha existente, nuevo con ficha, o solo nombre
  $('fCliente').innerHTML = '<option value="">Elegí el cliente…</option>'
    + clientes.map((c) => `<option value="${c.id}">${esc(c.nombre)}</option>`).join('')
    + '<option value="__nuevo">➕ Nuevo cliente (con ficha)…</option>'
    + '<option value="__libre">✎ Solo nombre (sin ficha)</option>';
  if (r?.clienteId && clientes.some((c) => c.id === r.clienteId)) {
    $('fCliente').value = r.clienteId;
    $('fNombre').classList.add('oculto');
  } else if (r) {
    $('fCliente').value = '__libre';
    $('fNombre').classList.remove('oculto');
  } else {
    $('fNombre').classList.add('oculto');
  }
  $('fNombre').value = r?.clienteNombre ?? '';
  $('fCabana').value = r?.cabanaId ?? (cabanas[0]?.id ?? '');
  $('fIn').value = r?.checkIn ?? '';
  $('fOut').value = r?.checkOut ?? '';
  $('fHoraIn').value = r?.horaEntrada ?? '14:00';
  $('fHoraOut').value = r?.horaSalida ?? '10:00';
  $('fAdultos').value = r?.adultos ?? 2;
  $('fNinos').value = r?.ninos ?? 0;
  $('fTotal').value = r ? totalDe(r) : '';
  $('fMonedaRes').value = monedaDe(r);
  $('fEstado').value = r?.estado === 'confirmada' ? 'confirmada' : 'presupuesto';
  $('fEstado').disabled = !!editId;   // el estado se cambia con los botones, no editando
  $('fNotas').value = r?.notas ?? '';
  calcN();
  $('modal').showModal();
  $('fNombre').focus();
}

$('fCliente').addEventListener('change', async () => {
  const v = $('fCliente').value;
  $('fNombre').classList.toggle('oculto', v !== '__libre');
  if (v === '__libre') { $('fNombre').focus(); return; }
  if (v !== '__nuevo') return;
  const nombre = (prompt('Nombre del nuevo cliente:') ?? '').trim();
  if (!nombre) { $('fCliente').value = ''; return; }
  const telefono = (prompt('Teléfono con código de país (opcional):') ?? '').trim();
  try {
    const ref = await addDoc(collection(db, 'clientes'), {
      nombre, telefono: telefono || null, email: null, pais: null, notas: '',
      creadoEn: serverTimestamp(), creadoPor: u.uid, creadoNombre: u.nombre ?? ''
    });
    clientes.push({ id: ref.id, nombre, telefono });
    clientes.sort((a, b) => a.nombre.localeCompare(b.nombre));
    $('fCliente').innerHTML = '<option value="">Elegí el cliente…</option>'
      + clientes.map((c) => `<option value="${c.id}">${esc(c.nombre)}</option>`).join('')
      + '<option value="__nuevo">➕ Nuevo cliente (con ficha)…</option>'
      + '<option value="__libre">✎ Solo nombre (sin ficha)</option>';
    $('fCliente').value = ref.id;
    CV2.toast('✓ Cliente creado — completá su ficha en Clientes cuando quieras', 'success');
  } catch (e) { CV2.toast('No se pudo crear: ' + (e.code ?? e.message), 'error'); $('fCliente').value = ''; }
});

$('btnNueva').addEventListener('click', () => abrirModal(null));
window.editar = (id) => abrirModal(reservas.find((x) => x.id === id));
$('mCancelar').addEventListener('click', () => $('modal').close());

$('mGuardar').addEventListener('click', async () => {
  const selCli = $('fCliente').value;
  let clienteId = null, nombre = '';
  if (selCli && selCli !== '__libre' && selCli !== '__nuevo') {
    clienteId = selCli;
    nombre = clientes.find((c) => c.id === selCli)?.nombre ?? '';
  } else {
    nombre = $('fNombre').value.trim();
  }
  const ci = $('fIn').value, co = $('fOut').value;
  if (!nombre) { CV2.toast('Elegí el cliente o escribí el nombre', 'error'); return; }
  if (!ci || !co || co <= ci) { CV2.toast('Revisá las fechas', 'error'); return; }
  const cabanaId = $('fCabana').value;
  const estado = $('fEstado').value;

  if (estado === 'confirmada') {
    const c = conflicto(cabanaId, ci, co, editId);
    if (c && !confirm(`⚠ Se superpone con la reserva de ${c.clienteNombre}. ¿Guardar igual?`)) return;
  }

  const datos = {
    clienteNombre: nombre,
    clienteId,
    cabanaId,
    checkIn: ci, checkOut: co,
    horaEntrada: $('fHoraIn').value || '14:00',
    horaSalida: $('fHoraOut').value || '10:00',
    adultos: Math.max(1, parseInt($('fAdultos').value) || 1),
    ninos: Math.max(0, parseInt($('fNinos').value) || 0),
    moneda: $('fMonedaRes').value,
    total: Math.max(0, parseFloat($('fTotal').value) || 0),
    // Se conserva totalBRL por compatibilidad con las reservas viejas y con
    // cualquier vista que todavía lo lea; manda 'total' + 'moneda'.
    totalBRL: $('fMonedaRes').value === 'BRL'
      ? Math.max(0, parseFloat($('fTotal').value) || 0) : 0,
    notas: $('fNotas').value.trim(),
    actualizadoEn: serverTimestamp()
  };
  $('mGuardar').disabled = true;
  try {
    if (editId) {
      datos.historial = registrarCambio('datos editados');
      await updateDoc(doc(db, 'reservas', editId), datos);
      CV2.toast('Guardada', 'success');
      // Si cambió fecha/cabaña, la limpieza se realinea sola
      const rPrev = reservas.find((x) => x.id === editId);
      try { await RCore.sincronizarLimpiezas([{ ...rPrev, ...datos, id: editId }], cabanas, u); }
      catch (e2) { console.warn('limpiezas:', e2); }
    } else {
      const nuevaRef = await addDoc(collection(db, 'reservas'), {
        ...datos,
        estado,
        origen: 'directa',
        googleEventId: null,
        historial: [{ fecha: Timestamp.now(), autorUid: u.uid, autorNombre: u.nombre ?? '', cambio: `creada (${estado})` }],
        creadoEn: serverTimestamp(), creadoPor: u.uid, creadoNombre: u.nombre ?? ''
      });
      CV2.toast('Creada', 'success');
      // Si nace confirmada, se le crea la limpieza ya mismo. Si el check-in
      // está a más de 7 días, todavía no se materializa: se avisa para no
      // dejar al usuario esperando algo que no va a aparecer.
      if (estado === 'confirmada') {
        try {
          const s = await RCore.sincronizarLimpiezas(
            [{ ...datos, id: nuevaRef.id, estado }], cabanas, u);
          if (s.creadas) CV2.toast(`🧹 Limpieza creada para el ${CV2.fmtFecha(ci)}`, 'info');
          else CV2.toast(`La limpieza aparecerá una semana antes del ${CV2.fmtFecha(ci)}`, 'info');
        } catch (e2) {
          console.warn('limpiezas:', e2);
          CV2.toast('No se pudo crear la limpieza: ' + (e2.code ?? e2.message), 'error');
        }
      }
    }
    $('modal').close();
  } catch (e) { CV2.toast('No se pudo: ' + (e.code ?? e.message), 'error'); }
  finally { $('mGuardar').disabled = false; }
});

// ═══ Pagos y señas ════════════════════════════════════════
// Listas mantenibles en config/dinero: al registrar un pago se puede
// AGREGAR una nueva categoría o cuenta en el momento (opción ➕).
let listas = { categoriasRecepcion: ['Alquiler', 'Seña', 'Extra'], cuentasDestino: [] };

async function cargarListas() {
  try {
    const s = await getDoc(doc(db, 'config', 'dinero'));
    if (s.exists()) {
      const d = s.data();
      if (Array.isArray(d.categoriasRecepcion) && d.categoriasRecepcion.length) listas.categoriasRecepcion = d.categoriasRecepcion;
      if (Array.isArray(d.cuentasDestino)) listas.cuentasDestino = d.cuentasDestino;
    }
  } catch { /* primera vez */ }
}

const opcionesLista = (arr) =>
  arr.map((x) => `<option value="${esc(x)}">${esc(x)}</option>`).join('')
  + '<option value="__nueva">➕ Agregar nueva…</option>';

function poblarSelectsPago() {
  $('pCategoria').innerHTML = opcionesLista(listas.categoriasRecepcion);
  $('pCuenta').innerHTML = '<option value="">— sin especificar —</option>' + opcionesLista(listas.cuentasDestino);
}

async function manejarNueva(sel, campo) {
  if (sel.value !== '__nueva') return;
  const nombre = (prompt('Nombre de la nueva ' + (campo === 'categoriasRecepcion' ? 'categoría' : 'cuenta de destino') + ':') ?? '').trim();
  if (!nombre) { sel.selectedIndex = 0; return; }
  if (!listas[campo].includes(nombre)) {
    listas[campo] = [...listas[campo], nombre];
    try {
      await setDoc(doc(db, 'config', 'dinero'), { [campo]: arrayUnion(nombre) }, { merge: true });
    } catch (e) { CV2.toast('No se pudo guardar en la lista: ' + (e.code ?? e.message), 'error'); }
  }
  poblarSelectsPago();
  sel.value = nombre;
}
$('pCategoria').addEventListener('change', () => manejarNueva($('pCategoria'), 'categoriasRecepcion'));
$('pCuenta').addEventListener('change', () => manejarNueva($('pCuenta'), 'cuentasDestino'));
function refrescarEquiv() {
  const r = reservas.find((x) => x.id === pagoReservaId);
  const mon = monedaDe(r);
  const distinta = $('pMoneda').value !== mon;
  $('grupoEquiv').classList.toggle('oculto', !distinta);
  if (distinta) {
    $('lblEquiv').textContent = 'Equivalente en ' + (mon === 'BRL' ? 'R$' : 'U$D')
      + ' (moneda de la reserva, al cambio de hoy)';
  }
}
$('pMoneda').addEventListener('change', refrescarEquiv);

window.abrirPago = (rid) => {
  pagoReservaId = rid;
  const r = reservas.find((x) => x.id === rid);
  const mon = monedaDe(r);
  const saldo = totalDe(r) - pagadoDe(rid);
  $('pQuien').textContent = `${r.clienteNombre} · ${nombreCab(r.cabanaId)} · saldo ${CV2.fmtMonto(Math.max(0, saldo), mon)}`;
  $('pConcepto').value = pagosDe(rid).length ? 'saldo' : 'sena';
  $('pMetodo').value = r.origen === 'airbnb' ? 'airbnb' : 'pix';
  $('pMoneda').value = mon;
  $('grupoEquiv').classList.add('oculto');
  $('pEquiv').value = '';
  poblarSelectsPago();
  $('pMonto').value = '';
  $('pFecha').value = CV2.hoyISO();
  $('pNota').value = '';
  $('mPago').showModal();
  $('pMonto').focus();
};
$('pCancelar').addEventListener('click', () => $('mPago').close());
$('pGuardar').addEventListener('click', async () => {
  const monto = Math.max(0, parseFloat($('pMonto').value) || 0);
  if (!monto) { CV2.toast('Falta el monto', 'error'); return; }
  const moneda = $('pMoneda').value;
  const rAct = reservas.find((x) => x.id === pagoReservaId);
  const monRes = monedaDe(rAct);
  // El equivalente se pide en la moneda de LA RESERVA, para que su saldo
  // cierre. La plata en sí se guarda en la moneda en que entró.
  const montoEquiv = moneda === monRes
    ? monto : Math.max(0, parseFloat($('pEquiv').value) || 0);
  if (moneda !== monRes && !montoEquiv) {
    CV2.toast('Cargá el equivalente en ' + (monRes === 'BRL' ? 'R$' : 'U$D')
      + ' (para el saldo de la reserva)', 'error');
    return;
  }
  if ($('pCategoria').value === '__nueva' || $('pCuenta').value === '__nueva') {
    CV2.toast('Terminá de agregar la opción nueva', 'error');
    return;
  }
  $('pGuardar').disabled = true;
  try {
    const r = reservas.find((x) => x.id === pagoReservaId);
    const pagoRef = await addDoc(collection(db, 'pagos'), {
      reservaId: pagoReservaId,
      monto, moneda, montoEquiv, monedaReserva: monRes,
      // Se conserva montoBRL solo cuando aplica, por compatibilidad.
      montoBRL: moneda === 'BRL' ? monto : (monRes === 'BRL' ? montoEquiv : 0),
      categoria: $('pCategoria').value || null,
      cuentaDestino: $('pCuenta').value || null,
      concepto: $('pConcepto').value,
      metodo: $('pMetodo').value,
      fecha: $('pFecha').value || CV2.hoyISO(),
      nota: $('pNota').value.trim(),
      comprobanteUrl: null,
      creadoEn: serverTimestamp(), creadoPor: u.uid, creadoNombre: u.nombre ?? ''
    });
    // Puente a Dinero: todo cobro de reserva es una percepción del negocio.
    // Entra como ingreso, categoría fija "Reservas" (para identificar que
    // viene de la página de reservas), con la cuenta donde se recibió.
    // Vínculo refTipo/refId → no se duplica si se reprocesa.
    await addDoc(collection(db, 'movimientos'), {
      fecha: $('pFecha').value || CV2.hoyISO(),
      tipo: 'entro',
      monto, moneda,
      // La plata se guarda como entró: la cuenta define la moneda. Solo se
      // completa montoBRL si el ingreso fue en reales.
      montoBRL: moneda === 'BRL' ? monto : 0,
      categoria: 'Reservas',
      cuenta: $('pCuenta').value || null,
      uid: u.uid,
      nombre: (r && r.clienteNombre) || '',
      detalle: 'Reserva ' + ((r && r.clienteNombre) || '') + ' · ' + $('pConcepto').value,
      comprobanteUrl: null,
      pendiente: null,
      refTipo: 'pago', refId: pagoRef.id,
      creadoEn: serverTimestamp(), creadoPor: u.uid, creadoNombre: u.nombre ?? '',
      actualizadoEn: serverTimestamp()
    });
    await updateDoc(doc(db, 'reservas', pagoReservaId), {
      historial: registrarCambio(`pago ${$('pConcepto').value} ${CV2.fmtMonto(monto, moneda)}${moneda !== monRes ? ' (≈' + CV2.fmtMonto(montoEquiv, monRes) + ')' : ''} → ${$('pCuenta').value || 'sin cuenta'}`),
      actualizadoEn: serverTimestamp()
    });
    $('mPago').close();
    CV2.toast('💰 Pago registrado · ingreso en Dinero', 'success');
  } catch (e) { CV2.toast('No se pudo: ' + (e.code ?? e.message), 'error'); }
  finally { $('pGuardar').disabled = false; }
});

window.borrarPago = async (pid) => {
  if (!confirm('¿Eliminar este pago?\n\nTambién se borra el ingreso que generó en Dinero.')) return;
  try {
    await deleteDoc(doc(db, 'pagos', pid));
    // El ingreso vinculado se va con él: si no, Dinero mostraría plata que
    // ya no está respaldada por ningún cobro.
    try {
      const q = await getDocs(query(collection(db, 'movimientos'), where('refId', '==', pid)));
      for (const d of q.docs) await deleteDoc(doc(db, 'movimientos', d.id));
    } catch (e2) { console.warn('mov vinculado:', e2); }
    CV2.toast('Pago eliminado', 'success');
  } catch (e) { CV2.toast('No se pudo: ' + (e.code ?? e.message), 'error'); }
};

// ═══ Sync Airbnb (admin) ══════════════════════════════════
if (CV2.puede('reservas')) {
  $('btnAirbnb').classList.remove('oculto');
  $('btnAirbnb').addEventListener('click', async () => {
    $('btnAirbnb').disabled = true;
    try {
      const s = await RCore.sincronizarAirbnb(reservas, cabanas, u);
      CV2.toast(`↔ Airbnb: ${s.nuevas} nueva(s), ${s.actualizadas} con cambios, ${s.anuladas} cancelada(s)`
        + (s.cabanasSinCalendario ? ` · ${s.cabanasSinCalendario} cabaña(s) sin calendario` : ''), 'success');
    } catch (e) {
      if (e.code === 'sin-clave') {
        const clave = (prompt('Pegá la Google API Key (la misma del sistema viejo, en config/integraciones):') ?? '').trim();
        if (clave) {
          await RCore.guardarApiKeyGoogle(clave);
          CV2.toast('Clave guardada — tocá Airbnb de nuevo', 'success');
        }
      } else {
        CV2.toast('Sync falló: ' + (e.code ?? e.message), 'error');
      }
    } finally { $('btnAirbnb').disabled = false; }
  });
}

$('filtros').addEventListener('click', (ev) => {
  const b = ev.target.closest('.fchip');
  if (!b) return;
  filtro = b.dataset.f;
  document.querySelectorAll('.fchip').forEach((x) => x.classList.toggle('activo', x === b));
  render();
});

// ═══ Cargas iniciales ═════════════════════════════════════
await cargarListas();
try {
  const scl = await getDocs(collection(db, 'clientes'));
  scl.forEach((d) => clientes.push({ id: d.id, ...d.data() }));
  clientes.sort((a, b) => (a.nombre ?? '').localeCompare(b.nombre ?? ''));
} catch { /* sin clientes */ }

// Cabañas: si la colección está vacía, el admin puede crear las 3 base
{
  const sc = await getDocs(collection(db, 'cabanas'));
  sc.forEach((d) => cabanas.push({ id: d.id, ...d.data() }));
  cabanas.sort((a, b) => (a.orden ?? 0) - (b.orden ?? 0));

  if (!cabanas.length) {
    $('lista').innerHTML = CV2.puede('contenido')
      ? '<div class="vacio">Primero cargá las cabañas: <a href="./cabanas.html">abrí Cabañas</a> y creá las 3 base.</div>'
      : '<div class="vacio">No hay cabañas cargadas todavía. Avisale al administrador.</div>';
  }
}

// ═══ Suscripción — AL FINAL ═══════════════════════════════
onSnapshot(query(collection(db, 'pagos')), (snap) => {
  pagos = [];
  snap.forEach((d) => pagos.push({ id: d.id, ...d.data() }));
  render();
}, (e) => console.error('pagos:', e));

onSnapshot(query(collection(db, 'reservas')), (snap) => {
  reservas = [];
  snap.forEach((d) => reservas.push({ id: d.id, ...d.data() }));
  reservas.sort((a, b) => (b.checkIn ?? '').localeCompare(a.checkIn ?? ''));
  render();
  // Materializa (sin bloquear el render) las limpiezas y controles que
  // entran en la ventana de 7 días. Idempotente: no duplica.
  if (cabanas.length && !materializado) {
    materializado = true;
    RCore.materializarPendientes(reservas, cabanas, u)
      .then((r) => { if (r.creadas) CV2.toast('🧹 ' + r.creadas + ' limpieza(s)/control(es) programados', 'info'); })
      .catch((e) => console.warn('materializar:', e));
  }
}, (e) => { console.error(e); CV2.toast('No se pudieron cargar las reservas', 'error'); });
</script>
